<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI論壇 — 討論プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #14171f;
    --ink-2: #1c202b;
    --washi: #eae3d3;
    --washi-2: #ddd3bc;
    --washi-line: #c9bd9f;
    --text: #211d17;
    --text-soft: #55503f;
    --vermilion: #b7312c;
    --vermilion-deep: #8f2622;
    --indigo: #2c4a6e;
    --indigo-deep: #1e344f;
    --gold: #a8874f;
    --paper-shadow: 0 18px 40px -20px rgba(20,23,31,0.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, #1d2333 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #22283a 0%, transparent 55%),
      var(--ink);
    color: var(--washi);
    font-family: 'Noto Sans JP', sans-serif;
    min-height:100vh;
    padding: 32px 16px 80px;
  }
  .wrap{max-width: 760px; margin: 0 auto;}

  /* header */
  header{ text-align:center; margin-bottom: 34px; position:relative;}
  .eyebrow{
    font-family:'Space Mono', monospace; font-size:11px; letter-spacing:0.22em;
    color: var(--gold); text-transform:uppercase; margin-bottom:10px;
  }
  h1{
    font-family:'Shippori Mincho', serif; font-weight:800; font-size:42px;
    margin:0 0 8px; letter-spacing:0.04em; color:#f3ede0;
    text-shadow: 0 2px 24px rgba(183,49,44,0.18);
  }
  .sub{ color:#9aa1b4; font-size:13.5px; line-height:1.7; max-width:480px; margin:0 auto;}
  .sub b{color:#c9b98a; font-weight:500;}

  /* card base = washi paper */
  .paper{
    background: linear-gradient(180deg, var(--washi) 0%, var(--washi-2) 100%);
    color: var(--text);
    border-radius: 3px;
    box-shadow: var(--paper-shadow);
    position:relative;
  }
  .paper::before{
    content:''; position:absolute; inset:0; pointer-events:none; border-radius:3px;
    background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.015) 0 1px, transparent 1px 3px);
  }

  /* setup card */
  .setup{ padding: 26px 24px 24px; margin-bottom: 26px;}
  .field{ margin-bottom: 18px; }
  .field label{
    display:block; font-family:'Space Mono',monospace; font-size:10.5px;
    letter-spacing:0.14em; text-transform:uppercase; color: var(--text-soft); margin-bottom:7px;
  }
  textarea, input[type=text]{
    width:100%; border:1px solid var(--washi-line); background: rgba(255,255,255,0.5);
    border-radius:2px; padding:11px 12px; font-family:'Noto Sans JP',sans-serif;
    font-size:14.5px; color:var(--text); resize:vertical; outline:none;
  }
  textarea:focus, input[type=text]:focus{ border-color: var(--vermilion); background:#fff;}
  textarea{min-height:64px;}
  .row{ display:flex; gap:12px; }
  .row .field{flex:1;}
  .chiplist{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{
    font-family:'Space Mono',monospace; font-size:12px; padding:8px 13px;
    border:1px solid var(--washi-line); border-radius:20px; cursor:pointer;
    background: rgba(255,255,255,0.4); color:var(--text-soft); transition: all .15s ease;
    user-select:none;
  }
  .chip.active{ background: var(--vermilion); border-color:var(--vermilion); color:#fdf5ef; }
  .chip small{display:block; font-family:'Noto Sans JP',sans-serif; font-size:10px; margin-top:2px; opacity:0.85;}

  .persona-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .persona-box{ border:1px solid var(--washi-line); border-radius:2px; padding:12px; background:rgba(255,255,255,0.35);}
  .persona-name{ display:flex; align-items:center; gap:8px; font-weight:700; margin-bottom:8px; font-size:13.5px;}
  .seal{ width:20px; height:20px; border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho',serif; font-size:11px; color:#fff; font-weight:700;}
  .seal.kuro{ background: var(--indigo); }
  .seal.cha{ background: var(--vermilion); }

  button.primary{
    width:100%; padding:15px; border:none; border-radius:2px; cursor:pointer;
    background: linear-gradient(180deg, var(--vermilion) 0%, var(--vermilion-deep) 100%);
    color:#fff5ec; font-family:'Shippori Mincho',serif; font-weight:700; font-size:16px;
    letter-spacing:0.08em; box-shadow: 0 10px 22px -8px rgba(183,49,44,0.6);
    transition: transform .12s ease;
  }
  button.primary:active{ transform: scale(0.98); }
  button.primary:disabled{ opacity:0.55; cursor:default; }

  button.ghost{
    background:transparent; border:1px solid var(--washi-line); color:var(--text-soft);
    font-family:'Space Mono',monospace; font-size:11.5px; padding:9px 14px; border-radius:20px; cursor:pointer;
  }
  button.ghost:hover{ border-color: var(--vermilion); color: var(--vermilion); }

  /* debate feed */
  #feed{ display:flex; flex-direction:column; gap:14px; margin-bottom: 20px; }
  .turn{
    max-width: 86%; padding: 15px 17px; border-radius:2px; position:relative;
    animation: rise .35s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .turn.kuro{ align-self:flex-start; background: linear-gradient(180deg,#eef2f6,#e2e9ef); border-left:3px solid var(--indigo); margin-right:auto;}
  .turn.cha{ align-self:flex-end; background: linear-gradient(180deg,#faf1ea,#f4e3d6); border-right:3px solid var(--vermilion); margin-left:auto;}
  .turn-head{ display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; font-weight:700; color:var(--text);}
  .turn-head .reply{ font-family:'Space Mono',monospace; font-weight:400; font-size:10.5px; color:var(--text-soft); }
  .turn-body{ font-size:14px; line-height:1.85; color:var(--text); white-space:pre-wrap; }
  .thinking{ display:flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:11.5px; color:#c9b98a; padding:6px 4px;}
  .dot{ width:5px; height:5px; border-radius:50%; background:currentColor; animation: blink 1.1s infinite ease-in-out;}
  .dot:nth-child(2){animation-delay:.15s;} .dot:nth-child(3){animation-delay:.3s;}
  @keyframes blink{ 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }

  /* conclusion / hanko */
  .conclusion-wrap{ position:relative; padding: 30px 24px 26px; margin: 6px 0 26px; overflow:hidden;}
  .conclusion-label{ font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:0.18em; color:var(--text-soft); margin-bottom:10px;}
  .conclusion-body{ font-size:15px; line-height:1.9; color:var(--text); white-space:pre-wrap; }
  .hanko{
    position:absolute; top:18px; right:22px; width:64px; height:64px; border-radius:6px;
    border:3px solid var(--vermilion); color:var(--vermilion);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:'Shippori Mincho',serif; font-weight:800; font-size:13px; line-height:1.2;
    transform: rotate(-8deg) scale(2.4); opacity:0; mix-blend-mode:multiply;
    animation: stamp .6s cubic-bezier(.2,1.6,.4,1) 0.15s forwards;
  }
  @keyframes stamp{ 0%{opacity:0; transform:rotate(-8deg) scale(2.4);} 60%{opacity:1;} 100%{opacity:0.92; transform:rotate(-8deg) scale(1);} }

  /* article */
  .article-wrap{ padding:24px; margin-bottom: 26px; }
  .article-title{ font-family:'Shippori Mincho',serif; font-weight:800; font-size:19px; margin:0 0 12px; color:var(--text);}
  .article-body{ font-size:14px; line-height:1.95; color:var(--text); white-space:pre-wrap; }
  .article-actions{ display:flex; gap:10px; margin-top:16px; }

  section.hidden{ display:none; }
  .section-eyebrow{
    font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:0.18em; color:var(--gold);
    text-transform:uppercase; margin: 30px 0 12px; display:flex; align-items:center; gap:10px;
  }
  .section-eyebrow::after{ content:''; flex:1; height:1px; background: rgba(168,135,79,0.35); }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:#f3ede0; color:var(--text); padding:10px 18px; border-radius:20px;
    font-family:'Space Mono',monospace; font-size:12px; box-shadow:0 10px 24px rgba(0,0,0,0.35);
    opacity:0; pointer-events:none; transition: opacity .25s ease;
  }
  .toast.show{ opacity:1; }

  .history-item{
    display:flex; justify-content:space-between; align-items:center; padding:12px 14px;
    border:1px solid var(--washi-line); border-radius:2px; background:rgba(255,255,255,0.35);
    margin-bottom:8px; cursor:pointer; font-size:13px;
  }
  .history-item:hover{ border-color: var(--vermilion); }
  .history-item .meta{ font-family:'Space Mono',monospace; font-size:10.5px; color:var(--text-soft); }

  footer{ text-align:center; margin-top:40px; font-family:'Space Mono',monospace; font-size:10.5px; color:#565d73; letter-spacing:0.08em; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Amado Papa Lab — Prototype</div>
    <h1>AI論壇</h1>
    <div class="sub">議題をひとつ投げ込み、<b>クロちゃん</b>と<b>チャーリー</b>に討論させて note のネタを作る。<br>※このプロトタイプは2人格ともClaude APIで演じています（本番でGPT接続に差し替え予定）。</div>
  </header>

  <div class="paper setup" id="setupCard">
    <div class="field">
      <label>議題</label>
      <textarea id="topic" placeholder="例）NISAとiDeCo、今から始めるならどっちが得か"></textarea>
    </div>

    <div class="field">
      <label>落とし所タイプ</label>
      <div class="chiplist" id="landingChips">
        <div class="chip active" data-val="属性分岐型">属性分岐型<small>条件で結論が変わる</small></div>
        <div class="chip" data-val="明確結論型">明確結論型<small>最後にジャッジをつける</small></div>
        <div class="chip" data-val="両論併記型">両論併記型<small>結論は出さず論点整理</small></div>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>討論ターン数</label>
        <div class="chiplist" id="turnChips">
          <div class="chip" data-val="3">3往復</div>
          <div class="chip active" data-val="4">4往復</div>
          <div class="chip" data-val="5">5往復</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>参加者の立場（空欄なら自動設定）</label>
      <div class="persona-grid">
        <div class="persona-box">
          <div class="persona-name"><div class="seal kuro">ク</div>クロちゃん</div>
          <input type="text" id="kuroRole" placeholder="例）堅実・データ重視派">
        </div>
        <div class="persona-box">
          <div class="persona-name"><div class="seal cha">チ</div>チャーリー</div>
          <input type="text" id="chaRole" placeholder="例）直感・自由重視派">
        </div>
      </div>
    </div>

    <button class="primary" id="startBtn">討論をはじめる</button>
  </div>

  <div id="debateSection" class="hidden">
    <div class="section-eyebrow">討論</div>
    <div id="feed"></div>
  </div>

  <div id="conclusionSection" class="hidden">
    <div class="section-eyebrow">落とし所</div>
    <div class="paper conclusion-wrap">
      <div class="hanko" id="hanko">結<br>了</div>
      <div class="conclusion-label" id="conclusionType"></div>
      <div class="conclusion-body" id="conclusionBody"></div>
    </div>
  </div>

  <div id="articleSection" class="hidden">
    <div class="section-eyebrow">note記事プレビュー</div>
    <div class="paper article-wrap">
      <div class="article-title" id="articleTitle"></div>
      <div class="article-body" id="articleBody"></div>
      <div class="article-actions">
        <button class="ghost" id="copyBtn">記事本文をコピー</button>
        <button class="ghost" id="newBtn">新しい議題で討論する</button>
      </div>
    </div>
  </div>

  <div id="historySection">
    <div class="section-eyebrow">討論ログ</div>
    <div id="historyList"></div>
  </div>

  <footer>AI論壇 — note.com ネタ出しプロトタイプ</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const feed = document.getElementById('feed');
const debateSection = document.getElementById('debateSection');
const conclusionSection = document.getElementById('conclusionSection');
const articleSection = document.getElementById('articleSection');
const startBtn = document.getElementById('startBtn');
const topicEl = document.getElementById('topic');
const kuroRoleEl = document.getElementById('kuroRole');
const chaRoleEl = document.getElementById('chaRole');

let landingType = '属性分岐型';
let turnCount = 4;

document.querySelectorAll('#landingChips .chip').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('#landingChips .chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); landingType = c.dataset.val;
  });
});
document.querySelectorAll('#turnChips .chip').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('#turnChips .chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); turnCount = parseInt(c.dataset.val);
  });
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function callClaude(systemPrompt, userPrompt){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });
    const data = await res.json();
    if(!res.ok){
      const msg = (data && data.error && data.error.message) ? data.error.message : `HTTPエラー ${res.status}`;
      throw new Error(msg);
    }
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if(!textBlock) throw new Error('応答にテキストが含まれていません');
    return textBlock.text.trim();
  }catch(e){
    console.error('callClaude error:', e);
    return '__ERROR__:' + (e && e.message ? e.message : '不明なエラー');
  }
}

function personaSystemPrompt(name, role, opponentName, topic){
  return `あなたは「${name}」という論客です。討論テーマ「${topic}」について、${role ? role : 'あなたらしい一貫した視点'}の立場で発言してください。
ルール:
- 発言は日本語、150〜220字程度で簡潔に。
- 相手（${opponentName}）の直前の発言がある場合は、それに触れながら反論または深掘りすること。
- 同じ主張の繰り返しや、安易な同調はしないこと。自分の立場を安易に譲らない。
- 発言本文のみを出力し、名前や記号は付けない。`;
}

function turnHTML(speaker, cls, replyTo, text){
  const div = document.createElement('div');
  div.className = 'turn ' + cls;
  div.innerHTML = `<div class="turn-head">${speaker}${replyTo ? `<span class="reply">→ ${replyTo}へ</span>` : ''}</div><div class="turn-body"></div>`;
  div.querySelector('.turn-body').textContent = text;
  return div;
}

function showFatalError(msg){
  const div = document.createElement('div');
  div.className = 'turn kuro';
  div.style.borderLeftColor = '#b7312c';
  div.innerHTML = `<div class="turn-head" style="color:#b7312c;">エラー</div><div class="turn-body"></div>`;
  div.querySelector('.turn-body').textContent = '通信でエラーが発生しました： ' + msg + '\n\nもう一度「討論をはじめる」を押して再試行してください。';
  feed.appendChild(div);
  div.scrollIntoView({behavior:'smooth', block:'end'});
  startBtn.disabled = false;
  startBtn.textContent = '討論をはじめる';
  showToast('エラーが発生しました');
}

function thinkingEl(name){
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = `${name}が思案中 <span class="dot">・</span><span class="dot">・</span><span class="dot">・</span>`;
  return div;
}

let transcript = []; // {speaker, text}

async function runDebate(){
  const topic = topicEl.value.trim();
  if(!topic){ showToast('議題を入力してください'); return; }

  transcript = [];
  feed.innerHTML = '';
  debateSection.classList.remove('hidden');
  conclusionSection.classList.add('hidden');
  articleSection.classList.add('hidden');
  startBtn.disabled = true;
  startBtn.textContent = '討論を進めています…';

  const kuroRole = kuroRoleEl.value.trim();
  const chaRole = chaRoleEl.value.trim();

  for(let round = 1; round <= turnCount; round++){
    // クロちゃん
    let think = thinkingEl('クロちゃん');
    feed.appendChild(think); think.scrollIntoView({behavior:'smooth', block:'end'});
    const kuroPrompt = transcript.length === 0
      ? `討論の口火を切ってください。`
      : `ここまでの討論ログ:\n${transcript.map(t=>`${t.speaker}: ${t.text}`).join('\n')}\n\n直前のチャーリーの発言に対して、あなたの立場から発言してください。`;
    const kuroText = await callClaude(personaSystemPrompt('クロちゃん', kuroRole, 'チャーリー', topic), kuroPrompt);
    think.remove();
    if(kuroText.startsWith('__ERROR__:')){
      showFatalError(kuroText.replace('__ERROR__:',''));
      return;
    }
    transcript.push({speaker:'クロちゃん', text: kuroText});
    const kEl = turnHTML('クロちゃん', 'kuro', round>1 ? 'チャーリー' : null, kuroText);
    feed.appendChild(kEl); kEl.scrollIntoView({behavior:'smooth', block:'end'});

    // チャーリー
    think = thinkingEl('チャーリー');
    feed.appendChild(think); think.scrollIntoView({behavior:'smooth', block:'end'});
    const chaPrompt = `ここまでの討論ログ:\n${transcript.map(t=>`${t.speaker}: ${t.text}`).join('\n')}\n\n直前のクロちゃんの発言に対して、あなたの立場から発言してください。`;
    const chaText = await callClaude(personaSystemPrompt('チャーリー', chaRole, 'クロちゃん', topic), chaPrompt);
    think.remove();
    if(chaText.startsWith('__ERROR__:')){
      showFatalError(chaText.replace('__ERROR__:',''));
      return;
    }
    transcript.push({speaker:'チャーリー', text: chaText});
    const cEl = turnHTML('チャーリー', 'cha', 'クロちゃん', chaText);
    feed.appendChild(cEl); cEl.scrollIntoView({behavior:'smooth', block:'end'});
  }

  await runConclusion(topic);
  await runArticle(topic);

  startBtn.disabled = false;
  startBtn.textContent = 'もう一度討論する';
  await saveHistory(topic);
}

async function runConclusion(topic){
  const typeInstruction = {
    '属性分岐型': '結論は一つに決めつけず、「どういう条件・属性の人にはどちらが向くか」を整理してまとめること。',
    '明確結論型': '討論の内容を踏まえて、どちらの論がより説得力があったか明確にジャッジし、理由とともに結論を出すこと。',
    '両論併記型': '無理に結論を出さず、両者の論点を公平に整理し、読者に判断を委ねる形でまとめること。'
  }[landingType];

  const sys = `あなたは討論の進行役です。以下の討論ログを読み、日本語250〜350字で「落とし所」をまとめてください。落とし所のタイプは「${landingType}」です。${typeInstruction}`;
  const body = await callClaude(sys, transcript.map(t=>`${t.speaker}: ${t.text}`).join('\n'));
  if(body.startsWith('__ERROR__:')){ showFatalError(body.replace('__ERROR__:','')); return; }

  document.getElementById('conclusionType').textContent = `落とし所タイプ：${landingType}`;
  document.getElementById('conclusionBody').textContent = body;
  const hanko = document.getElementById('hanko');
  hanko.style.animation = 'none'; void hanko.offsetWidth; hanko.style.animation = null;
  conclusionSection.classList.remove('hidden');
  conclusionSection.scrollIntoView({behavior:'smooth', block:'start'});
  transcript.push({speaker:'【落とし所】', text: body});
}

async function runArticle(topic){
  const sys = `あなたはnote.comのライター編集者です。以下のAI討論ログをもとに、note記事のドラフトを作成してください。
出力は以下の2部構成、それぞれ明確に分けて出力すること:
【タイトル】に続けて記事タイトル案を1行
【本文】に続けて、討論の掛け合いを活かした読み物形式の本文（600〜800字程度、冒頭に導入、最後に一言まとめ）
装飾記号(#や*)は使わず、自然な日本語の地の文で書くこと。`;
  const raw = await callClaude(sys, `テーマ: ${topic}\n\n討論ログ:\n${transcript.map(t=>`${t.speaker}: ${t.text}`).join('\n')}`);
  if(raw.startsWith('__ERROR__:')){ showFatalError(raw.replace('__ERROR__:','')); return; }

  let title = 'AI論壇：討論より';
  let body = raw;
  const titleMatch = raw.match(/【タイトル】\s*([^\n]+)/);
  const bodyMatch = raw.match(/【本文】\s*([\s\S]+)/);
  if(titleMatch) title = titleMatch[1].trim();
  if(bodyMatch) body = bodyMatch[1].trim();

  document.getElementById('articleTitle').textContent = title;
  document.getElementById('articleBody').textContent = body;
  articleSection.classList.remove('hidden');
  articleSection.scrollIntoView({behavior:'smooth', block:'start'});

  window.__lastArticle = { title, body };
}

document.getElementById('copyBtn').addEventListener('click', async ()=>{
  const a = window.__lastArticle;
  if(!a) return;
  try{
    await navigator.clipboard.writeText(`${a.title}\n\n${a.body}`);
    showToast('コピーしました');
  }catch(e){ showToast('コピーに失敗しました'); }
});

document.getElementById('newBtn').addEventListener('click', ()=>{
  topicEl.value=''; kuroRoleEl.value=''; chaRoleEl.value='';
  debateSection.classList.add('hidden');
  conclusionSection.classList.add('hidden');
  articleSection.classList.add('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
});

startBtn.addEventListener('click', runDebate);

// ---- history (personal storage) ----
async function saveHistory(topic){
  try{
    const id = 'debate_' + Date.now();
    const record = {
      id, topic, landingType, turnCount,
      transcript, article: window.__lastArticle,
      createdAt: new Date().toISOString()
    };
    await window.storage.set(id, JSON.stringify(record), false);
    const idxRaw = await safeGet('debate_index');
    const idx = idxRaw ? JSON.parse(idxRaw) : [];
    idx.unshift({id, topic, createdAt: record.createdAt});
    await window.storage.set('debate_index', JSON.stringify(idx.slice(0,30)), false);
    renderHistory();
  }catch(e){ console.error('history save failed', e); }
}

async function safeGet(key){
  try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
  catch(e){ return null; }
}

async function renderHistory(){
  const list = document.getElementById('historyList');
  const idxRaw = await safeGet('debate_index');
  const idx = idxRaw ? JSON.parse(idxRaw) : [];
  if(idx.length === 0){
    list.innerHTML = `<div style="color:#7a8199; font-size:12.5px; font-family:'Space Mono',monospace;">まだ討論ログはありません</div>`;
    return;
  }
  list.innerHTML = '';
  idx.forEach(item=>{
    const d = document.createElement('div');
    d.className = 'history-item';
    const date = new Date(item.createdAt);
    d.innerHTML = `<span>${item.topic}</span><span class="meta">${date.getMonth()+1}/${date.getDate()}</span>`;
    d.addEventListener('click', async ()=>{
      const raw = await safeGet(item.id);
      if(!raw) return;
      const record = JSON.parse(raw);
      loadRecord(record);
    });
    list.appendChild(d);
  });
}

function loadRecord(record){
  topicEl.value = record.topic;
  transcript = record.transcript || [];
  feed.innerHTML = '';
  debateSection.classList.remove('hidden');
  transcript.forEach(t=>{
    if(t.speaker === '【落とし所】') return;
    const cls = t.speaker === 'クロちゃん' ? 'kuro' : 'cha';
    feed.appendChild(turnHTML(t.speaker, cls, null, t.text));
  });
  const concl = transcript.find(t=>t.speaker==='【落とし所】');
  if(concl){
    document.getElementById('conclusionType').textContent = `落とし所タイプ：${record.landingType}`;
    document.getElementById('conclusionBody').textContent = concl.text;
    conclusionSection.classList.remove('hidden');
  }
  if(record.article){
    document.getElementById('articleTitle').textContent = record.article.title;
    document.getElementById('articleBody').textContent = record.article.body;
    window.__lastArticle = record.article;
    articleSection.classList.remove('hidden');
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

renderHistory();
</script>
