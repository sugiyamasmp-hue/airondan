<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI論壇 — 会議モード プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171f; --washi:#eae3d3; --washi-2:#ddd3bc; --washi-line:#c9bd9f;
    --text:#211d17; --text-soft:#55503f;
    --vermilion:#b7312c; --vermilion-deep:#8f2622;
    --indigo:#2c4a6e; --gold:#a8874f; --you:#3d6b4c;
    --shadow:0 18px 40px -20px rgba(20,23,31,0.55);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:
      radial-gradient(1200px 600px at 15% -10%, #1d2333 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #22283a 0%, transparent 55%), var(--ink);
    color:var(--washi); font-family:'Noto Sans JP',sans-serif; min-height:100vh; padding:28px 16px 100px;}
  .wrap{max-width:720px; margin:0 auto;}
  header{text-align:center; margin-bottom:28px;}
  .eyebrow{font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--gold); text-transform:uppercase; margin-bottom:8px;}
  h1{font-family:'Shippori Mincho',serif; font-weight:800; font-size:36px; margin:0 0 8px; color:#f3ede0;}
  .sub{color:#9aa1b4; font-size:13px; line-height:1.7; max-width:460px; margin:0 auto;}
  .sub b{color:#c9b98a; font-weight:500;}

  .paper{background:linear-gradient(180deg,var(--washi) 0%,var(--washi-2) 100%); color:var(--text); border-radius:3px; box-shadow:var(--shadow);}
  .setup{padding:24px 22px; margin-bottom:22px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-soft); margin-bottom:6px;}
  textarea,input[type=text]{width:100%; border:1px solid var(--washi-line); background:rgba(255,255,255,.5); border-radius:2px; padding:10px 12px; font-family:'Noto Sans JP',sans-serif; font-size:14.5px; color:var(--text); outline:none;}
  textarea:focus,input:focus{border-color:var(--vermilion); background:#fff;}
  textarea{min-height:56px; resize:vertical;}
  .members{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px;}
  .badge{display:flex; align-items:center; gap:7px; font-family:'Space Mono',monospace; font-size:12px; padding:7px 12px; border:1px solid var(--washi-line); border-radius:20px; background:rgba(255,255,255,.4);}
  .dot{width:9px; height:9px; border-radius:50%;}
  .dot.kuro{background:var(--indigo);} .dot.cha{background:var(--vermilion);} .dot.you{background:var(--you);}

  button.primary{width:100%; padding:14px; border:none; border-radius:2px; cursor:pointer; background:linear-gradient(180deg,var(--vermilion),var(--vermilion-deep)); color:#fff5ec; font-family:'Shippori Mincho',serif; font-weight:700; font-size:15.5px; letter-spacing:.06em; box-shadow:0 10px 22px -8px rgba(183,49,44,.6);}
  button.primary:disabled{opacity:.5;}

  #feed{display:flex; flex-direction:column; gap:13px; margin-bottom:16px;}
  .turn{max-width:88%; padding:13px 16px; border-radius:2px; animation:rise .3s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
  .turn.kuro{align-self:flex-start; background:linear-gradient(180deg,#eef2f6,#e2e9ef); border-left:3px solid var(--indigo); margin-right:auto;}
  .turn.cha{align-self:flex-end; background:linear-gradient(180deg,#faf1ea,#f4e3d6); border-right:3px solid var(--vermilion); margin-left:auto;}
  .turn.you{align-self:center; background:linear-gradient(180deg,#eef4ee,#e0ebe2); border-top:3px solid var(--you); max-width:92%;}
  .turn-head{display:flex; align-items:center; gap:7px; margin-bottom:5px; font-size:11.5px; font-weight:700; color:var(--text);}
  .turn-body{font-size:14px; line-height:1.8; color:var(--text); white-space:pre-wrap;}

  .controls{display:flex; flex-direction:column; gap:10px; margin-bottom:20px;}
  .prompt-row{display:flex; gap:8px;}
  .prompt-row button{flex:1; padding:12px 8px; border:1px solid var(--washi-line); border-radius:2px; background:rgba(255,255,255,.06); color:var(--washi); font-family:'Space Mono',monospace; font-size:11.5px; cursor:pointer;}
  .prompt-row button:hover{border-color:var(--gold); color:var(--gold);}
  .say-row{display:flex; gap:8px;}
  .say-row textarea{flex:1; min-height:44px;}
  .say-row button{padding:0 18px; border:none; border-radius:2px; background:var(--you); color:#eef4ee; font-family:'Shippori Mincho',serif; font-weight:700; cursor:pointer;}
  .end-btn{width:100%; padding:13px; border:1px dashed var(--gold); border-radius:2px; background:transparent; color:var(--gold); font-family:'Space Mono',monospace; font-size:12px; cursor:pointer; letter-spacing:.08em;}

  .summary-wrap{padding:26px 22px; margin-top:6px; position:relative;}
  .hanko{position:absolute; top:16px; right:20px; width:58px; height:58px; border-radius:6px; border:3px solid var(--vermilion); color:var(--vermilion); display:flex; align-items:center; justify-content:center; font-family:'Shippori Mincho',serif; font-weight:800; font-size:12px; line-height:1.2; text-align:center; transform:rotate(-8deg) scale(2.2); opacity:0; mix-blend-mode:multiply; animation:stamp .55s cubic-bezier(.2,1.6,.4,1) .1s forwards;}
  @keyframes stamp{0%{opacity:0; transform:rotate(-8deg) scale(2.2);} 60%{opacity:1;} 100%{opacity:.92; transform:rotate(-8deg) scale(1);}}
  .summary-block h3{font-family:'Shippori Mincho',serif; font-size:15px; margin:14px 0 6px; color:var(--text);}
  .summary-block ul{margin:0; padding-left:18px; font-size:13.5px; line-height:1.8; color:var(--text);}

  .section-eyebrow{font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:.16em; color:var(--gold); text-transform:uppercase; margin:26px 0 10px; display:flex; align-items:center; gap:10px;}
  .section-eyebrow::after{content:''; flex:1; height:1px; background:rgba(168,135,79,.35);}
  .thinking{display:flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:11.5px; color:#c9b98a; padding:6px 4px;}
  .dotb{width:5px; height:5px; border-radius:50%; background:currentColor; animation:blink 1.1s infinite ease-in-out;}
  .dotb:nth-child(2){animation-delay:.15s;} .dotb:nth-child(3){animation-delay:.3s;}
  @keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Amado Papa Lab — Meeting Mode</div>
    <h1>AI会議室</h1>
    <div class="sub">議題を投げて、<b>クロちゃん</b>と<b>チャーリー</b>にアイデアを出させながら、<br>浩之さん自身もいつでも割り込んで発言できます。</div>
  </header>

  <div class="paper setup" id="setupCard">
    <div class="field">
      <label>議題</label>
      <textarea id="topic" placeholder="例）wagaya-recipeを広めるための戦略アイデアを出し合おう"></textarea>
    </div>
    <div class="field">
      <label>参加メンバー</label>
      <div class="members">
        <div class="badge"><span class="dot kuro"></span>クロちゃん（堅実・マーケ視点）</div>
        <div class="badge"><span class="dot cha"></span>チャーリー（直感・グロース視点）</div>
        <div class="badge"><span class="dot you"></span>浩之さん（あなた）</div>
      </div>
    </div>
    <button class="primary" id="startBtn">会議をはじめる</button>
  </div>

  <div id="meetingSection" class="hidden">
    <div class="section-eyebrow">会議</div>
    <div id="feed"></div>

    <div class="controls" id="controls">
      <div class="prompt-row">
        <button data-who="クロちゃん">クロちゃんに続けてもらう</button>
        <button data-who="チャーリー">チャーリーに続けてもらう</button>
      </div>
      <div class="say-row">
        <textarea id="youInput" placeholder="自分の意見を入力…（いつでもどうぞ）"></textarea>
        <button id="sayBtn">発言する</button>
      </div>
      <button class="end-btn" id="endBtn">◆ 会議を終了して議事録にまとめる</button>
    </div>
  </div>

  <div id="summarySection" class="hidden">
    <div class="section-eyebrow">議事録</div>
    <div class="paper summary-wrap">
      <div class="hanko" id="hanko">議<br>了</div>
      <div class="summary-block" id="summaryBody"></div>
    </div>
  </div>
</div>

<script>
const feed = document.getElementById('feed');
const meetingSection = document.getElementById('meetingSection');
const summarySection = document.getElementById('summarySection');
const setupCard = document.getElementById('setupCard');
const startBtn = document.getElementById('startBtn');
const topicEl = document.getElementById('topic');
let transcript = []; // {speaker, text}
let topic = '';

async function callClaude(systemPrompt, userPrompt){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:900, system:systemPrompt, messages:[{role:"user", content:userPrompt}]})
    });
    const data = await res.json();
    if(!res.ok){ throw new Error((data && data.error && data.error.message) || `HTTPエラー ${res.status}`); }
    const tb = (data.content||[]).find(b=>b.type==='text');
    if(!tb) throw new Error('応答にテキストがありません');
    return tb.text.trim();
  }catch(e){
    console.error(e);
    return '__ERROR__:' + (e && e.message ? e.message : '不明なエラー');
  }
}

function personaPrompt(name, opponentNames){
  const roleMap = {
    'クロちゃん':'堅実・データ重視でマーケティング的な視点から意見を言う論客',
    'チャーリー':'直感・スピード重視でグロースハック的な視点から意見を言う論客'
  };
  return `あなたは「${name}」です。${roleMap[name]}として、会議テーマ「${topic}」について発言してください。
これはブレインストーミング会議で、他の参加者（${opponentNames.join('、')}）や人間の参加者「浩之さん」の発言も混じります。
ルール:
- 日本語、120〜200字程度で簡潔に
- 直前の発言（特に浩之さんの発言があればそれを最優先で）に触れて反応すること
- 具体的なアイデア・提案を必ず1つは含めること
- 発言本文のみ出力。名前や記号は付けない。`;
}

function turnEl(speaker, cls, text){
  const div = document.createElement('div');
  div.className = 'turn ' + cls;
  div.innerHTML = `<div class="turn-head">${speaker}</div><div class="turn-body"></div>`;
  div.querySelector('.turn-body').textContent = text;
  return div;
}
function thinkingEl(name){
  const div = document.createElement('div');
  div.className='thinking';
  div.innerHTML = `${name}が考え中 <span class="dotb">・</span><span class="dotb">・</span><span class="dotb">・</span>`;
  return div;
}
function scrollDown(el){ el.scrollIntoView({behavior:'smooth', block:'end'}); }

async function requestTurn(name){
  const opponents = ['クロちゃん','チャーリー','浩之さん'].filter(n=>n!==name);
  const think = thinkingEl(name);
  feed.appendChild(think); scrollDown(think);
  const historyText = transcript.map(t=>`${t.speaker}: ${t.text}`).join('\n') || '（まだ発言なし。口火を切ってください）';
  const text = await callClaude(personaPrompt(name, opponents), historyText);
  think.remove();
  if(text.startsWith('__ERROR__:')){
    const err = turnEl('エラー','kuro', '通信エラー: ' + text.replace('__ERROR__:','') + '\nもう一度ボタンを押して再試行してください。');
    feed.appendChild(err); scrollDown(err);
    return;
  }
  transcript.push({speaker:name, text});
  const cls = name==='クロちゃん' ? 'kuro' : 'cha';
  const el = turnEl(name, cls, text);
  feed.appendChild(el); scrollDown(el);
}

document.querySelectorAll('.prompt-row button').forEach(btn=>{
  btn.addEventListener('click', ()=> requestTurn(btn.dataset.who));
});

document.getElementById('sayBtn').addEventListener('click', ()=>{
  const input = document.getElementById('youInput');
  const val = input.value.trim();
  if(!val) return;
  transcript.push({speaker:'浩之さん', text: val});
  const el = turnEl('浩之さん（あなた）', 'you', val);
  feed.appendChild(el); scrollDown(el);
  input.value = '';
});

startBtn.addEventListener('click', async ()=>{
  topic = topicEl.value.trim();
  if(!topic){ topicEl.focus(); return; }
  transcript = []; feed.innerHTML='';
  setupCard.classList.add('hidden');
  meetingSection.classList.remove('hidden');
  summarySection.classList.add('hidden');
  await requestTurn('クロちゃん');
});

document.getElementById('endBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('endBtn');
  btn.disabled = true; btn.textContent = '議事録をまとめています…';
  const sys = `あなたは会議の書記です。以下の会議ログ（AIと人間参加者「浩之さん」の発言を含む）を読み、
日本語で議事録を作成してください。出力は以下の3見出しで、それぞれ箇条書き2〜4個:
【決定事項】
【保留事項】
【次のアクション】
装飾記号(#や*)は使わず、見出しと箇条書き(・)のみで簡潔に。`;
  const historyText = transcript.map(t=>`${t.speaker}: ${t.text}`).join('\n');
  const raw = await callClaude(sys, historyText);
  btn.disabled = false; btn.textContent = '◆ 会議を終了して議事録にまとめる';
  if(raw.startsWith('__ERROR__:')){
    alert('議事録生成でエラー: ' + raw.replace('__ERROR__:',''));
    return;
  }
  const body = document.getElementById('summaryBody');
  body.innerHTML = raw.split('\n').map(line=>{
    if(line.startsWith('【')) return `<h3>${line}</h3>`;
    if(line.trim()) return `<div style="font-size:13.5px; line-height:1.8; color:var(--text);">${line}</div>`;
    return '';
  }).join('');
  const hanko = document.getElementById('hanko');
  hanko.style.animation='none'; void hanko.offsetWidth; hanko.style.animation=null;
  summarySection.classList.remove('hidden');
  scrollDown(summarySection);
});
</script>
</body>
</html>
